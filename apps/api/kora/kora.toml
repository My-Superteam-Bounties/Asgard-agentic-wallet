# Kora Paymaster Configuration for Asgard
# This node sponsors gas fees for all AI agents managed by Asgard.
# Agents only need SPL tokens (USDC) — the Kora node uses its SOL balance to pay network fees.
# Reference: https://launch.solana.com/docs/kora/operators/configuration

[kora]
rate_limit = 100

[kora.auth]
hmac_secret = "kora_hmac_your-minimum-32-character-secret-here"
max_timestamp_age = 300

[kora.cache]
enabled = false   # Set to true with Redis in production
# url = "redis://localhost:6379"
# default_ttl = 300
# account_ttl = 60

[kora.usage_limit]
enabled = false   # Enable with Redis for per-wallet limiting in production

[kora.enabled_methods]
liveness = true
estimate_transaction_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true

[validation]
# Use Jupiter for real-time USD-equivalent fee pricing
price_source = "Jupiter"

# Conservative limits suitable for devnet prototype
max_allowed_lamports = 5000000   # 0.005 SOL max fee per transaction
max_signatures = 10
allow_durable_transactions = false   # Block nonce replay attacks

# Program allowlist: only interact with known, audited programs
allowed_programs = [
  "11111111111111111111111111111111",                       # System Program
  "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",          # SPL Token
  "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",         # Associated Token Account
  "AddressLookupTab1e1111111111111111111111111",            # Address Lookup Table
  "ComputeBudget11111111111111111111111111111111",          # Compute Budget
  "JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4",         # Jupiter v6 Router
]

# Token allowlist: only accept these as payment tokens
allowed_tokens = [
  "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",  # USDC
  "So11111111111111111111111111111111111111112",      # wSOL
  "DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263",  # BONK
]

# Tokens accepted as fee payment from agents
allowed_spl_paid_tokens = [
  "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",  # USDC only
]

# Block known bad actors
disallowed_accounts = []

# ─── Fee Payer Protection ────────────────────────────────────────────────────
# The fee payer (Kora sponsor) CANNOT be used for any direct transfers or token ops.
# This prevents agents from exploiting the fee payer for unintended purposes.

[validation.fee_payer_policy.system]
allow_transfer = false
allow_assign = false
allow_create_account = false
allow_allocate = false

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.spl_token]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = false
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.token_2022]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = false
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

# Block risky Token-2022 extensions
[validation.token2022]
blocked_mint_extensions = [
  "transfer_hook",
  "pausable",
  "permanent_delegate",
]
blocked_account_extensions = [
  "cpi_guard",
  "memo_transfer",
]

# ─── Pricing ─────────────────────────────────────────────────────────────────
[validation.price]
type = "margin"
margin = 0.15   # 15% margin on network fees — keeps the sponsor wallet solvent

# ─── Monitoring ──────────────────────────────────────────────────────────────
[metrics]
enabled = true
endpoint = "/metrics"
port = 8080
scrape_interval = 60

[metrics.fee_payer_balance]
enabled = true
expiry_seconds = 30
